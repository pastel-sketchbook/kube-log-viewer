version: "3"

tasks:
  default:
    desc: "List all available tasks"
    cmds:
      - task --list-all

  # --- Core Development ---
  fmt:
    desc: "Format all Rust code"
    cmds:
      - cargo fmt --all

  build:
    desc: "Build in debug mode"
    deps: [fmt]
    cmds:
      - cargo build --workspace

  build:release:
    desc: "Build optimized release binary"
    deps: [check:all]
    cmds:
      - cargo build --workspace --release

  check:
    desc: "Run fmt, cargo check, and clippy"
    deps: [fmt]
    cmds:
      - cargo check --workspace --all-targets
      - cargo clippy --workspace --all-targets -- -D warnings

  test:
    desc: "Run all tests"
    cmds:
      - cargo test --workspace

  test:verbose:
    desc: "Run tests with output visible (--nocapture)"
    cmds:
      - cargo test --workspace -- --nocapture

  check:all:
    desc: "Run fmt, clippy, and tests"
    cmds:
      - task: fmt
      - task: check
      - task: test

  # --- Run ---
  run:
    desc: "Run kube-log-viewer"
    cmds:
      - cargo run --package kube-log-tui

  run:release:
    desc: "Run kube-log-viewer (release build)"
    cmds:
      - cargo run --package kube-log-tui --release

  run:cli:
    desc: "Run kube-log CLI"
    cmds:
      - cargo run --package kube-log-cli --

  run:cli:release:
    desc: "Run kube-log CLI (release build)"
    cmds:
      - cargo run --package kube-log-cli --release --

  # --- Install ---
  install:
    desc: "Install kube-log-viewer and kube-log to ~/.cargo/bin"
    deps: [check:all]
    cmds:
      - cargo install --path crates/kube-log-tui --force
      - cargo install --path crates/kube-log-cli --force

  # --- Versioning ---
  version:patch:
    desc: "Bump patch version (0.1.0 -> 0.1.1)"
    cmds:
      - |
        set -e
        CURRENT=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/kube-log-tui/Cargo.toml | head -1)
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
        NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
        for f in crates/kube-log-core/Cargo.toml crates/kube-log-tui/Cargo.toml crates/kube-log-cli/Cargo.toml; do
          sed -i '' "s/^version = \"$CURRENT\"/version = \"$NEXT\"/" "$f"
        done
        cargo generate-lockfile
        echo "Bumped $CURRENT -> $NEXT"

  version:minor:
    desc: "Bump minor version (0.1.0 -> 0.2.0)"
    cmds:
      - |
        set -e
        CURRENT=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/kube-log-tui/Cargo.toml | head -1)
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
        NEXT="$MAJOR.$((MINOR + 1)).0"
        for f in crates/kube-log-core/Cargo.toml crates/kube-log-tui/Cargo.toml crates/kube-log-cli/Cargo.toml; do
          sed -i '' "s/^version = \"$CURRENT\"/version = \"$NEXT\"/" "$f"
        done
        cargo generate-lockfile
        echo "Bumped $CURRENT -> $NEXT"

  version:major:
    desc: "Bump major version (0.1.0 -> 1.0.0)"
    cmds:
      - |
        set -e
        CURRENT=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/kube-log-tui/Cargo.toml | head -1)
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
        NEXT="$((MAJOR + 1)).0.0"
        for f in crates/kube-log-core/Cargo.toml crates/kube-log-tui/Cargo.toml crates/kube-log-cli/Cargo.toml; do
          sed -i '' "s/^version = \"$CURRENT\"/version = \"$NEXT\"/" "$f"
        done
        cargo generate-lockfile
        echo "Bumped $CURRENT -> $NEXT"

  version:tag:
    desc: "Git tag current version as v<version>"
    cmds:
      - |
        set -e
        VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/kube-log-tui/Cargo.toml | head -1)
        git tag "v$VERSION"
        echo "Tagged v$VERSION"

  # --- Release & Distribution ---
  release:
    desc: "Bump patch, commit, tag, and push to trigger release workflow"
    cmds:
      - task: version:patch
      - |
        set -e
        VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/kube-log-tui/Cargo.toml | head -1)
        git add crates/kube-log-core/Cargo.toml crates/kube-log-tui/Cargo.toml crates/kube-log-cli/Cargo.toml Cargo.lock
        git commit -m "chore: bump version to $VERSION"
        git tag "v$VERSION"
        git push && git push origin "v$VERSION"
        echo "Pushed v$VERSION — release workflow triggered"

  release:minor:
    desc: "Bump minor, commit, tag, and push to trigger release workflow"
    cmds:
      - task: version:minor
      - |
        set -e
        VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/kube-log-tui/Cargo.toml | head -1)
        git add crates/kube-log-core/Cargo.toml crates/kube-log-tui/Cargo.toml crates/kube-log-cli/Cargo.toml Cargo.lock
        git commit -m "chore: bump version to $VERSION"
        git tag "v$VERSION"
        git push && git push origin "v$VERSION"
        echo "Pushed v$VERSION — release workflow triggered"

  release:major:
    desc: "Bump major, commit, tag, and push to trigger release workflow"
    cmds:
      - task: version:major
      - |
        set -e
        VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/kube-log-tui/Cargo.toml | head -1)
        git add crates/kube-log-core/Cargo.toml crates/kube-log-tui/Cargo.toml crates/kube-log-cli/Cargo.toml Cargo.lock
        git commit -m "chore: bump version to $VERSION"
        git tag "v$VERSION"
        git push && git push origin "v$VERSION"
        echo "Pushed v$VERSION — release workflow triggered"

  # --- Code Quality ---
  loc:
    desc: "Show lines of code statistics using tokei"
    cmds:
      - tokei

  clean:
    desc: "Remove build artifacts"
    cmds:
      - cargo clean
